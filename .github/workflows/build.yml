# .github/workflows/build.yml
name: Build

on:
  workflow_call:
    inputs:
      version:
        type: string
        required: false
      features:
        type: string
        required: false
        default: default
        description: Space or comma separated list of features to activate
      prerelease:
        type: boolean
        description: "Identify the release as a prerelease. Defaults to false"
        required: false

  workflow_dispatch:
    inputs:
      features:
        type: string
        required: false
        default: default
        description: Space or comma separated list of features to activate

jobs:
  build:
    name: build ${{ matrix.target }} ${{ inputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # 1. Windows: 64位企业x86 与 ARM64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive: zip
          
          # 2. macOS: Intel 与 Apple Silicon
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: zip
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: zip
          
          # 3. Linux: 64位企业x86 与 ARM64架构
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz tar.xz tar.zst
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz tar.xz tar.zst

    runs-on: ${{matrix.os}}
    env:
      DIST_DIR: smartdns-${{ matrix.target }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}

      - name: Setup
        uses: ./.github/actions/setup
        with:
          rust_target: ${{ matrix.target }}
          install_patch_crate: "false" 
          install_wix: "false" 
          install_cargo_edit: "false" 

      - name: Build
        run: just build --release --no-default-features --features ${{ inputs.features }} --target=${{ matrix.target }}
        env:
          USE_CROSS: ${{ matrix.os == 'ubuntu-latest' }}

      - name: Package
        run: just target=${{ matrix.target }} pack
        shell: bash

      - name: Compute release label
        id: release_label
        uses: ./.github/actions/sanitize-label
        with:
          raw_label: ${{ inputs.version || github.ref_name }}
          fallback_sha: ${{ github.sha }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: smartdns-${{ matrix.target }}-${{ steps.release_label.outputs.value }}
          retention-days: 30
          path: |
            dist/*.zip
            dist/*.tar.gz
            dist/*.msi
            dist/*.exe
            dist/*sha256sum.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2.3.2
        if: ${{ startsWith(inputs.version, 'v') }}
        with:
          draft: false
          prerelease: ${{ inputs.prerelease }}
          tag_name: ${{ inputs.version }}
          files: |
            dist/*.zip
            dist/*.tar.gz
            dist/*.msi
            dist/*.exe
            dist/*sha256sum.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v7
      - name: Rename artifacts
        run: |
          mv smartdns-x86_64-unknown-linux-gnu-*/smartdns-x86_64-generic-linux-gnu-*.tar.gz smartdns-x86_64-generic-linux-gnu.tar.gz || true
          mv smartdns-aarch64-unknown-linux-gnu-*/smartdns-aarch64-generic-linux-gnu-*.tar.gz smartdns-aarch64-generic-linux-gnu.tar.gz || true
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Compute release label
        id: release_label
        uses: ./.github/actions/sanitize-label
        with:
          raw_label: ${{ inputs.version || github.ref_name }}
          fallback_sha: ${{ github.sha }}
      - name: Build and push Docker image
        run: |
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/smartdns"
          IMAGE_NAME_LOWER=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          
          docker buildx build --platform linux/amd64,linux/arm64 --build-arg VERSION=${{ inputs.version }} -t ${IMAGE_NAME_LOWER}:${{ steps.release_label.outputs.value }} --push -f ./docker/Dockerfile .
