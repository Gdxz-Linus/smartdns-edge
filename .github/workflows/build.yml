# .github/workflows/build.yml
name: Build

on:
  workflow_call:
    inputs:
      version:
        type: string
        required: false
      features:
        type: string
        required: false
        default: default
        description: Space or comma separated list of features to activate
      prerelease:
        type: boolean
        description: "Identify the release as a prerelease. Defaults to false"
        required: false

  workflow_dispatch:
    inputs:
      features:
        type: string
        required: false
        default: default
        description: Space or comma separated list of features to activate

jobs:
  build:
    name: build ${{ matrix.target }} ${{ inputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # 1. Windows: 64位企业x86 与 ARM64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive: zip
          
          # 2. macOS: Intel 与 Apple Silicon
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: zip
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: zip
          
          # 3. Linux: 64位企业x86 与 ARM64架构
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz tar.xz tar.zst
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz tar.xz tar.zst

    runs-on: ${{matrix.os}}
    env:
      DIST_DIR: smartdns-${{ matrix.target }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.version }}

      - name: Setup
        uses: ./.github/actions/setup
        with:
          rust_target: ${{ matrix.target }}
          install_patch_crate: "false" 
          install_wix: "false" 
          install_cargo_edit: "false" 

      - name: Build
        run: just build --release --no-default-features --features ${{ inputs.features }} --target=${{ matrix.target }}
        env:
          USE_CROSS: ${{ matrix.os == 'ubuntu-latest' }}

      - name: Package
        run: just target=${{ matrix.target }} pack
        shell: bash

      # 1. 先计算精准的版本号标签 (如 v1.0.1)
      - name: Compute release label
        id: release_label
        uses: ./.github/actions/sanitize-label
        with:
          raw_label: ${{ inputs.version || github.ref_name }}
          fallback_sha: ${{ github.sha }}

      # 2. 🌟 核心修复：基于精确版本号，绝对不误删扩展名，绝对不碰撞文件夹名！
      - name: Strip version suffix from dist artifacts
        run: |
          python3 -c '
          import os, re
          label = "${{ steps.release_label.outputs.value }}".lstrip("v")
          dist_dir = "dist"
          if label and os.path.exists(dist_dir):
              # 精准匹配 -v1.0.1 或 -1.0.1，绝对不碰扩展名
              pattern = re.compile(rf"-v?{re.escape(label)}")
              for f in os.listdir(dist_dir):
                  filepath = os.path.join(dist_dir, f)
                  if os.path.isfile(filepath):
                      # 修正 sha256 文本内部的内容
                      if f.endswith(".txt") or "sha256" in f:
                          with open(filepath, "r", encoding="utf-8", errors="ignore") as fp:
                              content = fp.read()
                          new_content = pattern.sub("", content)
                          with open(filepath, "w", encoding="utf-8") as fp:
                              fp.write(new_content)

                      # 修正文件名本身
                      new_f = pattern.sub("", f)
                      if new_f != f:
                          os.rename(filepath, os.path.join(dist_dir, new_f))
          '
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: smartdns-${{ matrix.target }}-${{ steps.release_label.outputs.value }}
          retention-days: 30
          path: |
            dist/*.zip
            dist/*.tar.gz
            dist/*.msi
            dist/*.exe
            dist/*sha256sum.txt

      - name: Publish release
        uses: softprops/action-gh-release@v3
        if: ${{ startsWith(inputs.version, 'v') }}
        with:
          draft: false
          prerelease: ${{ inputs.prerelease }}
          tag_name: ${{ inputs.version }}
          files: |
            dist/*.zip
            dist/*.tar.gz
            dist/*.msi
            dist/*.exe
            dist/*sha256sum.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.version }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v8
      - name: Rename artifacts
        run: |
          mv smartdns-x86_64-unknown-linux-gnu-*/smartdns-x86_64-*.tar.gz ./smartdns-x86_64-generic-linux-gnu.tar.gz || true
          mv smartdns-aarch64-unknown-linux-gnu-*/smartdns-aarch64-*.tar.gz ./smartdns-aarch64-generic-linux-gnu.tar.gz || true
        shell: bash
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Compute release label
        id: release_label
        uses: ./.github/actions/sanitize-label
        with:
          raw_label: ${{ inputs.version || github.ref_name }}
          fallback_sha: ${{ github.sha }}
      - name: Build and push Docker image
        run: |
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/smartdns-edge"
          IMAGE_NAME_LOWER=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          TAG_VERSION="${{ steps.release_label.outputs.value }}"
          
          # 1. 默认设置：始终打上版本号标签（如 :v1.0.1）
          TAGS="-t ${IMAGE_NAME_LOWER}:${TAG_VERSION}"
          
          # 2. 智能判断：如果是正式版本（非 prerelease）且版本号以 "v" 开头，额外追加 :latest 标签
          if [ "${{ inputs.prerelease }}" != "true" ] && [[ "$TAG_VERSION" =~ ^v[0-9] ]]; then
            TAGS="$TAGS -t ${IMAGE_NAME_LOWER}:latest"
          fi
          
          # 3. 执行多架构编译并推送
          docker buildx build --platform linux/amd64,linux/arm64 --build-arg VERSION=${{ inputs.version }} $TAGS --push -f ./docker/Dockerfile .