# .github/workflows/version.yml
name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: '选择升级版本类型 (Patch:修Bug, Minor:新功能, Major:大版本重构)'
        required: true
        type: choice
        options: [patch, minor, major, rc, beta, alpha]
        default: 'patch'

# 🌟 核心：在代码里显式声明写权限，双重保险，彻底解决权限 128 错误
permissions:
  contents: write
  packages: write

jobs:
  bump:
    runs-on: ubuntu-latest
    outputs:
      version: ${{env.version}}
    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
        # 🌟 核心：删除了原来的 persist-credentials: false。
        # 这样 GitHub 会自动把登录凭证注入到本地 Git 中，不需要任何第三方插件！
        fetch-depth: 0 

    - name: Setup
      uses: ./.github/actions/setup

    - name: Bump version ${{ github.event.inputs.bump }}
      run: |
        just bump ${{ github.event.inputs.bump }}
        
        # 🌟 极速解法：直接用原生命令行，秒读 Cargo.toml 里的真实版本号（过滤掉所有垃圾前缀）
        NEW_VER="v$(grep -m1 '^version' Cargo.toml | cut -d '"' -f2)"
        
        echo "version=$NEW_VER" >> "$GITHUB_ENV"
        echo "NEW_VERSION=$NEW_VER" >> "$GITHUB_ENV"
        
    - name: Commit and Push changes
      run: |
        # 配置机器人身份
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 提交修改
        git commit -a -m "🔖 Bump version to ${{ env.NEW_VERSION }}"
        
        # 创建本地版本标签
        git tag -a ${{ env.NEW_VERSION }} -m "Release ${{ env.NEW_VERSION }}"
        
        # 🌟 直接使用原生 git 命令推送！安全、省心，100% 成功
        git push origin HEAD:${{ github.ref_name }} --follow-tags

  build:
    needs: [ "bump" ]
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.bump.outputs.version }}
      prerelease: ${{ !contains('major, minor, patch', inputs.bump) }}
