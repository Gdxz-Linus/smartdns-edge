<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartDNS Edge - Smart DNS Gateway</title>
    <!-- 引入 Marked.js 用于客户端 Markdown 解析 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
	<meta name="yandex-verification" content="3d08923d49b82f5c" />
	<link rel="canonical" href="https://smartdns-edge.pages.dev/" />
    
    <style>
        /* 1. 现代 CSS 变量（主题切换） */
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f6f8fa;
            --text-primary: #24292f;
            --text-secondary: #57606a;
            --border-color: #d0d7de;
            --accent-color: #0969da;
            --accent-hover: #0550ae;
            --code-bg: #f6f8fa;
            --sidebar-bg: #ffffff;
            --sidebar-active-bg: #f0f3f6;
            --shadow: rgba(0, 0, 0, 0.05);
        }

        html.dark {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --border-color: #30363d;
            --accent-color: #58a6ff;
            --accent-hover: #1f6feb;
            --code-bg: #161b22;
            --sidebar-bg: #0d1117;
            --sidebar-active-bg: #21262d;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        /* 2. 基础重置与网格排版 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 3. 顶部导航栏样式 */
         .site-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            height: 70px;
        }

        .header-container {
            max-width: 1300px;
            width: 90%;
            height: 100%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .logo {
            font-size: 1.45rem;
            font-weight: 700;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap; 
        }

        .main-nav {
            display: flex;
            gap: clamp(4px, 1vw, 12px);
            height: 100%;
        }

        .nav-item {
            background: none;
            border: none;
            font-size: clamp(0.9rem, 0.95vw, 0.98rem);
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0 clamp(8px, 1.2vw, 14px); 
            font-weight: 500;
            position: relative;
            height: 100%;
            display: flex;
            align-items: center;
            transition: color 0.2s;
            white-space: nowrap;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--accent-color);
        }

        .nav-item.active::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: var(--accent-color);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        #lang-select {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.88rem;
            cursor: pointer;
            outline: none;
        }

        .btn-toggle {
            background: none;
            border: 1px solid var(--border-color);
            background-color: var(--bg-secondary);
            font-size: 1.1rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background-color 0.2s;
        }

        .btn-toggle:hover {
            background-color: var(--border-color);
        }

        @media (max-width: 1150px) {
            .header-container {
                width: 94%; 
                gap: 10px;
            }
            .main-nav {
                gap: 4px; 
            }
            .nav-item {
                padding: 0 8px; 
                font-size: 0.92rem;
            }
        }

        @media (max-width: 1000px) {
            .header-container {
                gap: 6px;
            }
            .logo {
                font-size: 1.15rem;
            }
            .nav-item {
                padding: 0 6px;
                font-size: 0.88rem;
            }
        }

        /* 4. 双布局容器设计 */
        .layout-wrapper {
            flex: 1;
            display: flex;
            width: 90%;
            margin: 40px auto 100px auto;
            gap: 40px;
            transition: max-width 0.3s;
        }

        /* 配置指导页面的双栏最大宽度 */
        .layout-wrapper:not(.no-sidebar) {
            max-width: 1250px;
        }

        /* 其他页面的单栏最大宽度限制 */
        .layout-wrapper.no-sidebar {
            max-width: 1250px;
        }

        /* 5. 侧边栏样式 */
        .sidebar {
            width: 250px;
            flex-shrink: 0;
            position: sticky;
            top: 110px;
            height: calc(100vh - 190px);
            overflow-y: auto;
            border-right: 1px solid var(--border-color);
            padding-right: 20px;
        }

        .no-sidebar .sidebar {
            display: none;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-item {
            padding: 10px 14px;
            font-size: 0.92rem;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 6px;
            margin-bottom: 6px;
            transition: all 0.2s;
        }

        .sidebar-item:hover {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
        }

        .sidebar-item.active {
            background-color: var(--sidebar-active-bg);
            color: var(--accent-color);
            font-weight: 600;
        }

        /* 6. 内容区排版 */
        .content-area {
            flex-grow: 1;
            min-width: 0;
        }

        /* 7. Markdown 标准化渲染样式 */
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            color: var(--text-primary);
            margin-top: 20px;
            margin-bottom: 12px;
            font-weight: 600;
            line-height: 1.25;
        }

        .markdown-body h1 {
            font-size: 1.3rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .markdown-body h2 {
            font-size: 1.15rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
        }

        .markdown-body h3 {
            font-size: 1rem;
        }

        .markdown-body p, .markdown-body ul, .markdown-body ol {
            margin-bottom: 16px;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .markdown-body ul, .markdown-body ol {
            padding-left: 2em;
        }

        .markdown-body li {
            margin-top: 0.25em;
        }

        .markdown-body a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .markdown-body a:hover {
            text-decoration: underline;
        }

        /* Markdown 表格高宽屏自适应 */
        .markdown-body table {
            display: block;
            width: 100%;
            width: max-content;
            max-width: 100%;
            overflow: auto;
            border-collapse: collapse;
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 0.92rem;
        }

        .markdown-body th, .markdown-body td {
            padding: 10px 14px;
            border: 1px solid var(--border-color);
        }

        .markdown-body th {
            font-weight: 600;
            background-color: var(--bg-secondary);
        }

        .markdown-body tr:nth-child(even) {
            background-color: var(--bg-secondary);
        }

        /* Markdown 代码块格式化 */
        .markdown-body pre {
            padding: 16px;
            overflow: auto;
            font-size: 85%;
            line-height: 1.45;
            background-color: var(--code-bg);
            border-radius: 6px;
            border: 1px solid var(--border-color);
            margin-bottom: 16px;
        }

        .markdown-body code {
            padding: .2em .4em;
            margin: 0;
            font-size: 85%;
            background-color: var(--code-bg);
            border-radius: 6px;
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
        }

        .markdown-body pre code {
            padding: 0;
            margin: 0;
            font-size: 100%;
            background-color: transparent;
            border-radius: 0;
        }

        .markdown-body blockquote {
            padding: 0 1em;
            color: var(--text-secondary);
            border-left: .25em solid var(--border-color);
            margin-bottom: 16px;
        }

        /* 8. 辅助状态样式 */
        .loading {
            font-size: 1.1rem;
            color: var(--text-secondary);
            text-align: center;
            padding: 40px 0;
        }

        .error-msg {
            color: #cf222e;
            background-color: #ffebe9;
            border: 1px solid #ff8182;
            padding: 18px;
            border-radius: 6px;
            margin: 20px 0;
            line-height: 1.6;
        }

        html.dark .error-msg {
            color: #ff8182;
            background-color: #311;
            border-color: #622;
        }

        /* 9. 页脚样式 */
        .site-footer {
            border-top: 1px solid var(--border-color);
            background-color: var(--bg-secondary);
            padding: 12px 0;
            font-size: 0.88rem;
            color: var(--text-secondary);
            text-align: center;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            box-shadow: 0 -2px 10px var(--shadow);
        }

        .site-footer a {
            color: var(--accent-color);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <!-- 顶栏区域 -->
    <header class="site-header">
        <div class="header-container">
            <div class="logo" id="header-logo">🐋 SmartDNS Edge</div>
            <nav class="main-nav" id="main-nav"></nav>
            <div class="header-actions">
                <select id="lang-select" onchange="changeLang(this.value)">
                    <option value="zh">简体中文</option>
                    <option value="en">English</option>
                </select>
                <button class="btn-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme">🌙</button>
            </div>
        </div>
    </header>

    <!-- 主体区域（双/单布局动态切换） -->
    <div class="layout-wrapper no-sidebar" id="layout-container">
        <!-- 侧边栏（按需显示） -->
        <aside class="sidebar" id="sidebar">
            <ul class="sidebar-menu" id="sidebar-menu"></ul>
        </aside>
        
        <!-- 主文档渲染区 -->
        <main class="content-area">
            <article class="markdown-body" id="markdown-content">
                <div class="loading">Loading...</div>
            </article>
        </main>
    </div>

    <!-- 页脚区域 -->
    <footer class="site-footer">
        <div class="footer-container">
            <p>Copyright © 2026 Gdxz.Linus. Open sourced under MIT. Hosted on <a href="https://github.com/Gdxz-Linus/smartdns-edge" target="_blank">GitHub</a>.</p>
        </div>
    </footer>

    <!-- 10. 交互逻辑 JavaScript -->
    <script>
        // 安全数据存储容器（防 file:// 本地打开时浏览器安全策略报错）
        const safeStorage = {
            getItem(key) {
                try {
                    return localStorage.getItem(key);
                } catch (e) {
                    return this[key] || null;
                }
            },
            setItem(key, value) {
                try {
                    localStorage.setItem(key, value);
                } catch (e) {
                    this[key] = value;
                }
            }
        };

        // A. 5个主菜单的配置及其对应的 md 文件路径（相对于 docs 根路径，直接采用 `zh/` 或 `en/`）
        const menuConfig = {
            home: {
                zh: { label: '主页', file: './zh/main.md' },
                en: { label: 'Home', file: './en/main.md' }
            },
            install: {
                zh: { label: '安装与运行', file: './zh/install&run.md' },
                en: { label: 'Install & Run', file: './en/install&run.md' }
            },
            download: {
                zh: { label: '下载', file: './zh/download.md' },
                en: { label: 'Download', file: './en/download.md' }
            },
            config: {
                zh: { label: '配置指导', file: null },
                en: { label: 'Config Guide', file: null }
            },
            options: {
                zh: { label: '配置选项说明', file: './zh/configuration.md' },
                en: { label: 'Config Options', file: './en/configuration.md' }
            },
            feedback: {
                zh: { label: '问题反馈', file: './zh/feedback.md' },
                en: { label: 'Feedback', file: './en/feedback.md' }
            }
        };

        // B. “配置指导”对应的 8 个子模块配置文件信息
        const configModules = [
            {
                id: '1-basic-service.md',
                zh: { label: '1. 基础服务与监听配置', file: './zh/config/1-basic-service.md' },
                en: { label: '1. Basic Service', file: './en/config/1-basic-service.md' }
            },
            {
                id: '2-upstream-and-proxy.md',
                zh: { label: '2. 上游 DNS 与代理通道', file: './zh/config/2-upstream-and-proxy.md' },
                en: { label: '2. Upstream & Proxy', file: './en/config/2-upstream-and-proxy.md' }
            },
            {
                id: '3-speed-check.md',
                zh: { label: '3. 解析测速与 IP 优选', file: './zh/config/3-speed-check.md' },
                en: { label: '3. Speed Check', file: './en/config/3-speed-check.md' }
            },
            {
                id: '4-dns-cache.md',
                zh: { label: '4. 高性能 DNS 缓存机制', file: './zh/config/4-dns-cache.md' },
                en: { label: '4. DNS Cache', file: './en/config/4-dns-cache.md' }
            },
            {
                id: '5-domain-control.md',
                zh: { label: '5. 域名控制与广告拦截', file: './zh/config/5-domain-control.md' },
                en: { label: '5. Domain Control', file: './en/config/5-domain-control.md' }
            },
            {
                id: '6-ip-control.md',
                zh: { label: '6. IP 控制与 CDN 加速', file: './zh/config/6-ip-control.md' },
                en: { label: '6. IP Control', file: './en/config/6-ip-control.md' }
            },
            {
                id: '7-split-routing.md',
                zh: { label: '7. 智能分流与客户端控制', file: './zh/config/7-split-routing.md' },
                en: { label: '7. Split Routing', file: './en/config/7-split-routing.md' }
            },
            {
                id: '8-firewall-integration.md',
                zh: { label: '8. 高级防火墙联动', file: './zh/config/8-firewall-integration.md' },
                en: { label: '8. Firewall Integration', file: './en/config/8-firewall-integration.md' }
            }
        ];

        // 默认状态变量
        let currentLang = 'zh';
        let activeMenu = 'home';
        let activeSubConfig = '1-basic-service.md';

        // 获取当前语言状态
        function getLang() {
            return safeStorage.getItem('lang') || (navigator.language.startsWith('zh') ? 'zh' : 'en');
        }

        // 1. 初始化主题设置
        function initTheme() {
            const savedTheme = safeStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-toggle').textContent = '☀️';
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('theme-toggle').textContent = '🌙';
            }
        }

        // 手动开灯/关灯切换
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            safeStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-toggle').textContent = isDark ? '☀️' : '🌙';
        }

        // 2. 路由逻辑解析器 (Hash-based Router)
        function handleHashRoute() {
            const hash = window.location.hash;
            let lang = getLang();
            let menu = 'home';
            let subFile = '1-basic-service.md';

            if (hash && hash.startsWith('#/')) {
                const parts = hash.slice(2).split('/');
                if (parts[0] === 'zh' || parts[0] === 'en') {
                    lang = parts[0];
                }
                if (menuConfig[parts[1]]) {
                    menu = parts[1];
                }
                if (parts[2]) {
                    subFile = parts[2];
                }
            }

            currentLang = lang;
            activeMenu = menu;
            activeSubConfig = subFile;

            // 同步下拉框状态
            safeStorage.setItem('lang', currentLang);
            document.getElementById('lang-select').value = currentLang;

            renderTopNav();
            renderSidebar();
            loadMarkdown();
        }

        // 3. 渲染主导航菜单
        function renderTopNav() {
            const nav = document.getElementById('main-nav');
            nav.innerHTML = '';
            Object.keys(menuConfig).forEach(key => {
                const item = menuConfig[key];
                const btn = document.createElement('button');
                btn.className = 'nav-item' + (key === activeMenu ? ' active' : '');
                // 改为读取当前语言对象下的 label
                btn.textContent = item[currentLang].label;
                btn.addEventListener('click', () => switchMenu(key));
                nav.appendChild(btn);
            });
        }

        // 4. 渲染或隐藏配置侧边栏（单/双栏切换）
        function renderSidebar() {
            const menu = document.getElementById('sidebar-menu');
            const container = document.getElementById('layout-container');

            if (activeMenu === 'config') {
                container.classList.remove('no-sidebar');
                menu.innerHTML = '';
                configModules.forEach(mod => {
                    const li = document.createElement('li');
                    // 使用唯一标识 id 进行激活项匹配
                    li.className = 'sidebar-item' + (mod.id === activeSubConfig ? ' active' : '');
                    // 改为读取当前语言对象下的 label
                    li.textContent = mod[currentLang].label;
                    li.addEventListener('click', () => switchSubConfig(mod.id));
                    menu.appendChild(li);
                });
            } else {
                container.classList.add('no-sidebar');
            }
        }

        // 5. 动态 Fetch 对应 Markdown 文件并渲染
        // 5. 动态 Fetch 对应 Markdown 文件并渲染（含表单自动注入与提交控制）
        async function loadMarkdown() {
            const contentArea = document.getElementById('markdown-content');
            contentArea.innerHTML = '<div class="loading">Loading...</div>';

            let url = '';
            if (activeMenu === 'config') {
                const activeMod = configModules.find(mod => mod.id === activeSubConfig);
                if (activeMod && activeMod[currentLang]) {
                    url = activeMod[currentLang].file;
                } else {
                    url = `./${currentLang}/config/${activeSubConfig}`;
                }
            } else {
                url = menuConfig[activeMenu][currentLang].file;
            }

            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`File not found: ${url} (HTTP ${response.status})`);
                }
                const markdownText = await response.text();
                contentArea.innerHTML = marked.parse(markdownText);

                // 🌟 核心新增：检测页面是否含有反馈表单占位符，若有则自动注入表单并绑定逻辑
                injectFeedbackFormIfNeeded();

            } catch (err) {
                let browserSecurityHelp = '';
                if (window.location.protocol === 'file:') {
                    browserSecurityHelp = `
                        <p style="margin-top:12px; color:#cf222e; font-weight:bold;">
                            ⚠️ 检测到您目前是通过双击本地 HTML 文件 (file:// 协议) 打开的。
                        </p>
                        <p style="font-size:0.92rem; margin-top:4px;">
                            由于浏览器的安全机制 (CORS)，直接在本地双击加载子文档会被浏览器拒绝，导致一直处于 Loading。
                        </p>
                        <p style="font-size:0.92rem; margin-top:4px; font-weight:bold;">
                            解决方法：请使用本地静态网页服务器打开本页面。当您将该项目部署至 GitHub Pages 时，此问题会自动消失。
                        </p>
                    `;
                }
                contentArea.innerHTML = `
                    <div class="error-msg">
                        <h3>加载失败 (Load Error)</h3>
                        <p>无法获取目标文档，请检查路径是否正确或稍后重试。</p>
                        <p style="font-size:0.85em; margin-top:8px; font-family:monospace; background:rgba(0,0,0,0.04); padding:4px 8px; border-radius:4px;">${err.message}</p>
                        ${browserSecurityHelp}
                    </div>`;
            }
        }

        // 🌟 核心新增：反馈表单注入与安全提交控制器
        function injectFeedbackFormIfNeeded() {
            const placeholder = document.getElementById("feedback-form-placeholder");
            if (!placeholder) return; // 没有占位符，说明不是反馈页面，直接退出

            const label_type = currentLang === 'zh' ? '反馈类型' : 'Feedback Type';
            const opt_bug = currentLang === 'zh' ? '🐛 Bug 反馈' : '🐛 Bug Report';
            const opt_sug = currentLang === 'zh' ? '💡 功能建议' : '💡 Feature Request';
            const opt_que = currentLang === 'zh' ? '💬 使用咨询' : '💬 Question/Support';
			const label_title = currentLang === 'zh' ? '简短标题' : 'Title';
            const label_desc = currentLang === 'zh' ? '详细问题描述（建议附带简要日志或配置，请勿包含私密密钥）' : 'Description';
            const btn_submit = currentLang === 'zh' ? '提交反馈' : 'Submit';
            const msg_empty = currentLang === 'zh' ? '请填写标题与描述！' : 'Please fill in both title and description.';
            const msg_sending = currentLang === 'zh' ? '正在努力向 GitHub 传送中，请稍候...' : 'Submitting to GitHub, please wait...';
            const msg_err = currentLang === 'zh' ? '反馈发送失败' : 'Submission failed';

            // 动态构建高度美观、完美契合亮/暗主题的 HTML 表单
            placeholder.innerHTML = `
                <div style="background-color: var(--bg-secondary); border: 1px solid var(--border-color); padding: 24px; border-radius: 8px; margin-top: 24px; box-shadow: var(--shadow);">
                    <form id="raw-feedback-form">
                        <div style="margin-bottom: 16px;">
                            <label style="display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.95rem;">${label_type}</label>
                            <select id="fb-type" style="width: 100%; padding: 10px; background-color: var(--bg-primary); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: 6px; outline: none;">
                                <option value="Bug">${opt_bug}</option>
                                <option value="Suggestion">${opt_sug}</option>
                                <option value="Question">${opt_que}</option> 
                            </select>
                        </div>
                        <div style="margin-bottom: 16px;">
                            <label style="display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.95rem;">${label_title}</label>
                            <input type="text" id="fb-title" placeholder="e.g. Windows下服务无法正常自启" style="width: 100%; padding: 10px; background-color: var(--bg-primary); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: 6px; outline: none; font-size: 0.95rem;" required />
                        </div>
                        <div style="margin-bottom: 20px;">
                            <label style="display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.95rem;">${label_desc}</label>
                            <textarea id="fb-desc" rows="8" placeholder="e.g. 1. 运行环境\n2. 具体复现步骤\n3. 终端报错日志" style="width: 100%; padding: 10px; background-color: var(--bg-primary); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: 6px; outline: none; font-size: 0.95rem; font-family: monospace; resize: vertical;" required></textarea>
                        </div>
                        <div id="fb-status-msg" style="margin-bottom: 16px; font-size: 0.95rem; font-weight: 500;"></div>
                        <button type="submit" id="fb-submit-btn" style="background-color: var(--accent-color); color: #ffffff; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-size: 0.95rem; font-weight: 600; transition: background-color 0.2s;">${btn_submit}</button>
                    </form>
                </div>
            `;

            // 监听表单安全提交
            const form = document.getElementById("raw-feedback-form");
            form.addEventListener("submit", async (e) => {
                e.preventDefault();

                const type = document.getElementById("fb-type").value;
                const title = document.getElementById("fb-title").value.trim();
                const description = document.getElementById("fb-desc").value.trim();
                const statusMsg = document.getElementById("fb-status-msg");
                const submitBtn = document.getElementById("fb-submit-btn");

                if (!title || !description) {
                    statusMsg.innerHTML = `<span style="color: #cf222e;">⚠️ ${msg_empty}</span>`;
                    return;
                }

                // 准备锁死按钮，防止用户重复疯狂点击
                submitBtn.disabled = true;
                submitBtn.style.opacity = "0.6";
                statusMsg.innerHTML = `<span style="color: var(--text-secondary);">${msg_sending}</span>`;

                // 🌟 获取当前访问域名并自动拼接 API。
                // 这样无论您访问 downloads-21j.pages.dev 还是 smartdns-edge.pages.dev，API 路径都会完美自适应！
                const apiUrl = `${window.location.protocol}//${window.location.host}/feedback`;

                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ type, title, description }),
                    });

                    const resData = await response.json();

                    if (response.ok && resData.success) {
                        // 提交成功，生成高亮成功弹窗并提供 GitHub 直达链接 [2]
                        statusMsg.innerHTML = `
                            <span style="color: #1a7f37; font-weight: bold; display: block; margin-bottom: 8px;">
                                💚 ${currentLang === 'zh' ? '反馈提交成功！' : 'Submitted successfully!'}
                            </span>
                            <span style="font-size: 0.92rem; color: var(--text-primary);">
                                ${currentLang === 'zh' ? '已在 GitHub 自动为您生成 Issue 编号' : 'GitHub Issue created'}: 
                                <a href="${resData.issue_url}" target="_blank" style="font-weight: bold; text-decoration: underline; color: var(--accent-color);">
                                    #${resData.issue_number} (点击前往查看)
                                </a>
                            </span>
                        `;
                        // 清空表单，并让按钮彻底功退
                        document.getElementById("fb-title").value = "";
                        document.getElementById("fb-desc").value = "";
                        submitBtn.style.display = "none";
                    } else {
                        throw new Error(resData.error || "未知服务器异常");
                    }
                } catch (err) {
                    statusMsg.innerHTML = `<span style="color: #cf222e;">❌ ${msg_err}: ${err.message}</span>`;
                    submitBtn.disabled = false;
                    submitBtn.style.opacity = "1";
                }
            });
        }

        // 6. 交互路由跳转控制
        function switchMenu(key) {
            if (key === 'config') {
                window.location.hash = `#/${currentLang}/config/${activeSubConfig}`;
            } else {
                window.location.hash = `#/${currentLang}/${key}`;
            }
        }

        function switchSubConfig(file) {
            window.location.hash = `#/${currentLang}/config/${file}`;
        }

        function changeLang(newLang) {
            safeStorage.setItem('lang', newLang);
            if (activeMenu === 'config') {
                window.location.hash = `#/${newLang}/config/${activeSubConfig}`;
            } else {
                window.location.hash = `#/${newLang}/${activeMenu}`;
            }
        }

        // 7. 脚本初始化执行入口
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
			
			// 🌟 核心新增：自动触发 GitHub 访问计数器（通过后台静默加载图片）
            new Image().src = "https://komarev.com/ghpvc/?username=Gdxz-Linus&repo=smartdns-edge&color=0969da&t=" + Date.now();
            
            // 绑定 Logo 的点击跳转
            document.getElementById('header-logo').addEventListener('click', () => {
                window.location.hash = `#/${getLang()}/home`;
            });

            // 如果首次进入页面且无 Hash 路由，跳转至默认 Hash
            if (!window.location.hash) {
                window.location.hash = `#/${getLang()}/home`;
            }

            // 监听 Hash 变化
            window.addEventListener('hashchange', handleHashRoute);
            handleHashRoute();
        });
    </script>
</body>
</html>
